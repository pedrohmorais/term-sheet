<div class="login-page">
  <mat-card class="login-card" *ngIf="state$ | async as state">
    <mat-card-header class="login-card__header">
      <div class="brand-logo">
        <span class="brand-term">Term</span><span class="brand-sheet">Sheet</span>
      </div>
    </mat-card-header>

    <mat-card-content>
      <h1 class="login-title">Welcome back</h1>
      <p class="login-subtitle">Sign in to manage your real estate deals</p>

      <div *ngIf="state.error" class="error-alert">
        <strong>Error:</strong> {{ state.error }}
      </div>

      <form [formGroup]="form" (ngSubmit)="onSubmit()" class="login-form">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Username</mat-label>
          <input matInput formControlName="username" autocomplete="username" />
          <mat-error *ngIf="usernameCtrl.hasError('required')">
            Username is required
          </mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Password</mat-label>
          <input
            matInput
            [type]="showPassword ? 'text' : 'password'"
            formControlName="password"
            autocomplete="current-password"
          />
          <button mat-icon-button matSuffix (click)="showPassword = !showPassword" type="button">
            <mat-icon>{{ showPassword ? 'visibility' : 'visibility_off' }}</mat-icon>
          </button>
          <mat-error *ngIf="passwordCtrl.hasError('required')">
            Password is required
          </mat-error>
          <mat-error *ngIf="passwordCtrl.hasError('minlength')">
            Password must be at least 3 characters
          </mat-error>
        </mat-form-field>

        <button
          mat-raised-button
          color="primary"
          type="submit"
          class="full-width submit-btn"
          [disabled]="state.isLoading"
        >
          <mat-spinner diameter="20" *ngIf="state.isLoading"></mat-spinner>
          <span *ngIf="!state.isLoading">Sign In</span>
        </button>
      </form>

      <div class="demo-credentials">
        <p><strong>Demo credentials:</strong></p>
        <p><code>admin / admin123</code> or <code>demo / demo123</code></p>
      </div>
    </mat-card-content>
  </mat-card>
</div>
